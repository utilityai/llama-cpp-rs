[package]
name = "llama-cpp-bindings-tests"
description = "Integration tests and fixtures for llama-cpp-bindings"
version = "0.5.0"
edition.workspace = true
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = { workspace = true }
encoding_rs = { workspace = true }
hf-hub = { workspace = true }
llama-cpp-bindings = { workspace = true, features = ["sampler"] }
llama-cpp-bindings-sys = { workspace = true }
serde_json = { workspace = true }
serial_test = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[features]
cuda = ["llama-cpp-bindings/cuda"]
cuda-no-vmm = ["llama-cpp-bindings/cuda-no-vmm"]
metal = ["llama-cpp-bindings/metal"]
vulkan = ["llama-cpp-bindings/vulkan"]
rocm = ["llama-cpp-bindings/rocm"]
multimodal_capable = []
mrope_model = []

[lints.rust]
unsafe_op_in_unsafe_fn = "warn"
unused_qualifications = "warn"

[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
