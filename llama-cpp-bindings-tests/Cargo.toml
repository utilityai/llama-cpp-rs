[package]
name = "llama-cpp-bindings-tests"
description = "Integration tests and fixtures for llama-cpp-bindings"
version = "0.5.0"
edition.workspace = true
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = "1.0.102"
encoding_rs = { workspace = true }
hf-hub = "0.5.0"
llama-cpp-bindings = { workspace = true, features = ["sampler"] }
llama-cpp-bindings-sys = { workspace = true }
serde_json = "1.0"
serial_test = "3"
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["json"] }

[features]
cuda = ["llama-cpp-bindings/cuda"]
cuda-no-vmm = ["llama-cpp-bindings/cuda-no-vmm"]
metal = ["llama-cpp-bindings/metal"]
vulkan = ["llama-cpp-bindings/vulkan"]
rocm = ["llama-cpp-bindings/rocm"]

[lints.rust]
unsafe_op_in_unsafe_fn = "warn"
unused_qualifications = "warn"

[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
