[workspace]
resolver = "2"
members = [
  "llama-cpp-bindings-build",
  "llama-cpp-bindings-sys",
  "llama-cpp-bindings",
]

[workspace.package]
edition = "2024"

[workspace.dependencies]
# core
encoding_rs = "0.8.35"
enumflags2 = "0.7.12"
llama-cpp-bindings = { path = "llama-cpp-bindings", version = "0.4.2" }
llama-cpp-bindings-sys = { path = "llama-cpp-bindings-sys", version = "0.4.2" }
thiserror = "2"
tracing = "0.1"
tracing-core = "0.1"

# build
bindgen = "0.72.1"
cc = "1.2.58"
cmake = "0.1"
find_cuda_helper = "0.2.0"
glob = "0.3.3"
llama-cpp-bindings-build = { path = "llama-cpp-bindings-build", version = "0.4.2" }
walkdir = "2"

# dev
anyhow = "1.0.102"
hf-hub = "0.5.0"
serde_json = "1.0"
serial_test = "3"
tracing-subscriber = { version = "0.3", features = ["json"] }

